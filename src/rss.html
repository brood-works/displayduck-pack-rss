<div class="rss {{ feedClass() }} {{ alignmentClass() }}">
  {{#if showEntries()}}
    {{#each entries()}}
      <div class="feed-item">
        {{#if this.imageUrl}}
          <div class="image">
            <img src="{{ this.imageUrl }}" alt="Feed Image">
          </div>
        {{/if}}
        <div class="item {{#if this.imageUrl}}has-image{{/if}}">
          <div class="title {{#if shadowsEnabled()}}shadows{{/if}}">{{ this.title }}</div>
        </div>
      </div>
    {{/each}}
  {{/if}}

  {{#if showFetchingState()}}
    <div class="status-view">
      <div class="icon spinner">
        <i class="fas fa-rss"></i>
      </div>
      <div class="message">Loading feed...</div>
    </div>
  {{/if}}

  {{#if showErrorState()}}
    <div class="status-view">
      <div class="icon">
        <i class="fas fa-rss"></i>
      </div>
      <div class="message">{{ errorMessage() }}</div>
    </div>
  {{/if}}
</div>
